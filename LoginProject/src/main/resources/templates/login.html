<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>SVPM COE Malegaon(BK)</title>

<style>

body{
    background:#e6f2ff;
    font-family:Arial;
}

.login-box{
    width:350px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

h2{
    color:blue;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    width:95%;
    padding:10px;
    background:blue;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:darkblue;
}

.error{
    color:red;
}

</style>

</head>

<body>

<div class="login-box">

<h2>SVPM COE Malegaon(BK)</h2>

<h3>Student Login</h3>

<form action="/login" method="post">

<input type="text"
name="username"
placeholder="Enter Username"
required>

<input type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

<br><br>

<p class="error" th:text="${msg}"></p>

</form>

</div>

</body>
</html>
